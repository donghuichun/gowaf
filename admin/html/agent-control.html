<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoWAF 网关管理系统 - Web攻击检测设置</title>
    <link rel="icon" href="res/gowaf_logo.png" type="image/png">
    <link href="lib/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="lib/bootstrap-icons/bootstrap-icons.css">
    <link rel="stylesheet" href="css/admin.css">
    <style>
        /* Web攻击检测设置样式 */
        .attack-detection-section {
            margin-bottom: 32px;
            padding: 20px;
            border: 1px solid #E5E6EB;
            border-radius: 8px;
            background: #F7F8FA;
        }
        
        .attack-detection-section h6 {
            font-size: 16px;
            font-weight: 600;
            color: #1D2129;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .attack-detection-section h6 i {
            color: var(--primary-color);
        }
        
        .attack-detection-section .section-desc {
            font-size: 14px;
            color: #86909C;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .detection-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #E5E6EB;
        }
        
        .detection-item:last-child {
            border-bottom: none;
        }
        
        .detection-item .item-label {
            font-size: 14px;
            color: #1D2129;
            font-weight: 500;
        }
        
        .detection-item .item-desc {
            font-size: 12px;
            color: #86909C;
            margin-top: 4px;
        }
        
        .detection-item .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .detection-item .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .detection-item .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        
        .detection-item .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        
        .detection-item input:checked + .slider {
            background-color: var(--primary-color);
        }
        
        .detection-item input:focus + .slider {
            box-shadow: 0 0 1px var(--primary-color);
        }
        
        .detection-item input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .save-web-attack-btn {
            margin-top: 24px;
            display: flex;
            justify-content: center;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="sidebar" class="sidebar"></div>
        <div class="main-content">
            <div class="page-header">
                <h2>Web攻击检测设置</h2>
                <p>配置SQL注入、XSS和其他Web攻击的检测规则</p>
            </div>
            <div class="content-card">
                <div class="card-header">
                    <h5 class="card-title">攻击检测设置</h5>
                </div>
                <div class="card-body">
                    <div id="webAttackSettings">
                        <div class="loading-state">
                            <div class="spinner-border text-primary" role="status"></div>
                            <span>加载中...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/admin.js"></script>
    <script>
        let webAttackSettings = {
            sql_injection_open: false,
            xss_open: false,
            path_traversal_open: false,
            command_injection_open: false,
            csrf_open: false,
            info_leak_open: false,
            user_agent_check_open: false
        };
        
        document.addEventListener('DOMContentLoaded', function() {
            loadSidebar();
            loadWebAttackSettings();
        });
        
        function loadWebAttackSettings() {
            SettingsApi.getByType('web_attack_settings')
                .then(data => {
                    if (data.code === 200 && data.data && data.data.content) {
                        let content = data.data.content;
                        if (typeof content === 'string') {
                            try {
                                content = JSON.parse(content);
                            } catch (e) {
                                console.error('解析content失败:', e);
                                content = {};
                            }
                        }
                        webAttackSettings = {
                            sql_injection_open: content.sql_injection_open || false,
                            xss_open: content.xss_open || false,
                            path_traversal_open: content.path_traversal_open || false,
                            command_injection_open: content.command_injection_open || false,
                            csrf_open: content.csrf_open || false,
                            info_leak_open: content.info_leak_open || false,
                            user_agent_check_open: content.user_agent_check_open || false
                        };
                    }
                    renderWebAttackSettings();
                })
                .catch(error => {
                    console.error('加载Web攻击检测设置失败:', error);
                    renderWebAttackSettings();
                });
        }
        
        function renderWebAttackSettings() {
            const webAttackSettingsEl = document.getElementById('webAttackSettings');
            webAttackSettingsEl.innerHTML = `
                <!-- SQL注入检测 -->
                <div class="attack-detection-section">
                    <h6><i class="bi bi-shield-exclamation"></i> SQL注入检测</h6>
                    <div class="section-desc">
                        检测并拦截SQL注入攻击，防止恶意用户通过输入SQL语句来获取、修改或删除数据库中的数据。
                        系统会检查URI、请求参数和POST请求体中的SQL注入特征。
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">SQL注入检测</div>
                            <div class="item-desc">检测并拦截SQL注入攻击</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.sql_injection_open ? 'checked' : ''} onchange="toggleSetting('sql_injection_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                
                <!-- XSS攻击检测 -->
                <div class="attack-detection-section">
                    <h6><i class="bi bi-shield-exclamation"></i> XSS攻击检测</h6>
                    <div class="section-desc">
                        检测并拦截跨站脚本攻击，防止恶意用户在网页中注入恶意脚本。
                        系统会检查HTML标签、JavaScript事件和JavaScript协议等XSS特征。
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">XSS攻击检测</div>
                            <div class="item-desc">检测并拦截跨站脚本攻击</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.xss_open ? 'checked' : ''} onchange="toggleSetting('xss_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                
                <!-- 其他Web攻击检测 -->
                <div class="attack-detection-section">
                    <h6><i class="bi bi-shield-exclamation"></i> 其他Web攻击检测</h6>
                    <div class="section-desc">
                        检测并拦截其他常见的Web攻击，包括路径遍历、命令注入、CSRF攻击和敏感信息泄露等。
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">路径遍历检测</div>
                            <div class="item-desc">检测并拦截路径遍历攻击</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.path_traversal_open ? 'checked' : ''} onchange="toggleSetting('path_traversal_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">命令注入检测</div>
                            <div class="item-desc">检测并拦截命令注入攻击</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.command_injection_open ? 'checked' : ''} onchange="toggleSetting('command_injection_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">CSRF攻击检测</div>
                            <div class="item-desc">检测并拦截跨站请求伪造攻击</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.csrf_open ? 'checked' : ''} onchange="toggleSetting('csrf_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">敏感信息泄露检测</div>
                            <div class="item-desc">检测并拦截敏感信息泄露</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.info_leak_open ? 'checked' : ''} onchange="toggleSetting('info_leak_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="detection-item">
                        <div>
                            <div class="item-label">User-Agent检测</div>
                            <div class="item-desc">检测并拦截压测工具、爬虫等异常User-Agent</div>
                        </div>
                        <label class="switch">
                            <input type="checkbox" ${webAttackSettings.user_agent_check_open ? 'checked' : ''} onchange="toggleSetting('user_agent_check_open', this.checked)">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                
                <div class="save-web-attack-btn">
                    <button class="btn btn-primary" onclick="saveWebAttackSettings()">
                        <i class="bi bi-save"></i> 保存设置
                    </button>
                </div>
            `;
        }
        
        function toggleSetting(key, value) {
            webAttackSettings[key] = value;
        }
        
        function saveWebAttackSettings() {
            const contentObj = webAttackSettings;
            
            const data = {
                type: 'web_attack_settings',
                content: JSON.stringify(contentObj)
            };
            
            SettingsApi.create(data)
            .then(response => {
                if (response.code === 200) {
                    toast.success('Web攻击检测设置保存成功');
                } else {
                    toast.error(response.msg || '设置保存失败');
                }
            })
            .catch(error => {
                console.error('保存Web攻击检测设置失败:', error);
                toast.error('设置保存失败');
            });
        }
    </script>
</body>
</html>
